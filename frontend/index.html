<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>slab</title>
  <link rel="stylesheet" href="design.css">
  <link rel="stylesheet" href="shell.css">
</head>
<body>

  <!-- Top bar (menu bar) -->
  <div id="menubar">
    <div class="menubar-left" id="menubar-app-settings">
      <!-- Contextual app settings appear here when app is focused -->
    </div>
    <div class="menubar-right" id="menubar-system">
      <!-- System icons (KDE style) + clock built by shell -->
    </div>
  </div>

  <!-- Tile grid (desktop surface) -->
  <div id="tile-grid">
    <div class="tile-grid-inner" id="tile-grid-inner">
      <!-- Live tiles get injected here -->
    </div>
  </div>

  <!-- Desktop surface (windows layer) -->
  <div id="desktop">
    <!-- Windows get injected here -->
  </div>

  <!-- Bottom bar (taskbar / toolbar) -->
  <div id="taskbar">
    <div class="taskbar-left" id="taskbar-apps">
      <!-- Open apps and workflow tabs appear here -->
    </div>
    <div class="taskbar-right">
      <div class="taskbar-spawn" id="taskbar-spawn">
        <!-- Spawn buttons built dynamically from app manifests -->
      </div>
    </div>
  </div>

  <!-- Dependencies loaded dynamically based on installed apps -->
  <script src="shell.js"></script>
</body>
</html>
